name: Security Validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Prepare artifacts directory
        run: mkdir -p artifacts

      - name: Dependency vulnerability scan
        run: |
          set -euo pipefail
          pip-audit -f json -o artifacts/pip-audit.json

      - name: Static security scan
        run: |
          set -euo pipefail
          bandit -r ingestion spark_jobs serving utils main.py -x tests,dbt_project,target,infra/terraform/generated -f json -o artifacts/bandit.json

      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-monitoring-${{ github.run_id }}
          path: artifacts/
          retention-days: 14
