version: "3.9"

x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: infra/Dockerfile.airflow
  env_file:
    - ../.env
    - ../.env.generated
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # Install all deps at container start — no requirements.txt needed
    PYTHONPATH: /opt/airflow
  volumes:
    - ../ingestion/dags:/opt/airflow/dags
    - ../ingestion/src:/opt/airflow/src
    - ../ingestion/operators:/opt/airflow/operators    # ← added
    - ../spark_jobs:/opt/airflow/spark_jobs
    - ../dbt_project:/opt/airflow/dbt_project
    - ../data_quality:/opt/airflow/data_quality        # ← added
    - airflow_logs:/opt/airflow/logs                   # ← named volume so logs persist
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ────────────────────────────────────────────────────────────────────────────
  # Database
  # ────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # Airflow — Init (runs once, then exits)
  # ────────────────────────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: ""
    command: >
      bash -c "
        airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com
      "
    restart: "no"

  # ────────────────────────────────────────────────────────────────────────────
  # Airflow — Webserver
  # ────────────────────────────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # Airflow — Scheduler
  # ────────────────────────────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--limit", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # Superset
  # ────────────────────────────────────────────────────────────────────────────
  superset:
    image: apache/superset:3.1.0
    env_file:
      - ../.env
    ports:
      - "8088:8088"
    volumes:
      - superset_data:/app/superset_home
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
