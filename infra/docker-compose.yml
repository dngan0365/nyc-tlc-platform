version: "3.9"

x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: infra/Dockerfile.airflow
  env_file:
    - ../.env
    - ../.env.generated
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # Install all deps at container start — no requirements.txt needed
    PYTHONPATH: /opt/airflow
  volumes:
    - ../ingestion/dags:/opt/airflow/dags
    - ../ingestion/src:/opt/airflow/src
    - ../ingestion/operators:/opt/airflow/operators    # ← added
    - ../spark_jobs:/opt/airflow/spark_jobs
    - ../dbt_project:/opt/airflow/dbt_project
    - ../data_quality:/opt/airflow/data_quality        # ← added
    - airflow_logs:/opt/airflow/logs                   # ← named volume so logs persist
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ────────────────────────────────────────────────────────────────────────────
  # Database
  # ────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # Airflow — Init (runs once, then exits)
  # ────────────────────────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: ""
    command: >
      bash -c "
        airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com
      "
    restart: "no"

  # ────────────────────────────────────────────────────────────────────────────
  # Airflow — Webserver
  # ────────────────────────────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # Airflow — Scheduler
  # ────────────────────────────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--limit", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ────────────────────────────────────────────────────────────────────────────
  # Superset
  # ────────────────────────────────────────────────────────────────────────────
  superset:
    build:
      context: ..
      dockerfile: infra/Dockerfile.superset

    env_file:
      - ../.env
      - ../.env.generated

    environment:
      SUPERSET_SECRET_KEY: "super-secret-key-change-this"
      PYTHONPATH: /app/pythonpath

    ports:
      - "8088:8088"

    volumes:
      - superset_data:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py

    depends_on:
      postgres:
        condition: service_healthy

    command:
      - /bin/sh
      - -c
      - |
        superset db upgrade &&
        superset fab create-admin \
          --username admin \
          --firstname Superset \
          --lastname Admin \
          --email admin@example.com \
          --password admin || true &&
        superset init &&
        /usr/bin/run-server.sh

    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8088/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

    restart: unless-stopped
 
  # ────────────────────────────────────────────────────────────────────────────
  # Superset — chart/dashboard bootstrap (runs once, then exits)
  # Waits for Superset to be healthy, then calls the REST API to create all
  # datasets, charts, and the dashboard automatically. No manual command needed.
  # ────────────────────────────────────────────────────────────────────────────
  superset-init:
    build:
      context: ..                             # repo root
      dockerfile: infra/Dockerfile.superset-init
    env_file:
      - ../.env
      - ../.env.generated
    environment:
      SUPERSET_URL: "http://superset:8088"    # service name, not localhost
      SUPERSET_USER: "${SUPERSET_USER:-admin}"
      SUPERSET_PASS: "${SUPERSET_PASS:-admin}"
      SUPERSET_DB_NAME: "${SUPERSET_DB_NAME:-Athena TLC}"
      SUPERSET_SCHEMA: "${SUPERSET_SCHEMA:-marts}"
      SUPERSET_WAIT_TIMEOUT: "120"            # seconds to wait for /health
    depends_on:
      superset:
        condition: service_healthy            # only starts after Superset is up
    restart: "no"                             # one-shot — exits after bootstrap

  # ────────────────────────────────────────────────────────────────────────────
  # Optional services (uncomment as needed)
  # ────────────────────────────────────────────────────────────────────────────

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    ports:
      - "5001:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --backend-store-uri sqlite:///mlflow.db
    restart: unless-stopped

  rag-app:
    build:
      context: ../serving/rag_app
      dockerfile: Dockerfile
    env_file:
      - ../.env
      - ../.env.generated
    ports:
      - "8501:8501"
    volumes:
      - ../serving/rag_app:/app
    command: >
      streamlit run streamlit_app.py
      --server.port=8501
      --server.address=0.0.0.0
    depends_on:
      - mlflow
    restart: unless-stopped

volumes:
  postgres_data:
  superset_data:
  airflow_logs:          # ← added; persists logs across restarts
